<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Search Page</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <style>
            body {
                background-color: #f4f4f1;
                font-family: Arial, sans-serif;
                color: #222222;
                margin: 0;
            }

            p.logo {
                margin: 30px 0 10px 60px;
                font-size: 18px;
                font-weight: bold;
                letter-spacing: 2px;
            }

            p.logo a {
                text-decoration: none;
                color: #222222;
            }

            ul {
                list-style-type: none;
                margin: 0 0 20px 40px;
                padding: 0;
                overflow: hidden;
            }

            li {
                float: left;
                border: 1px solid #cfcfc8;
                background-color: #ffffff;
                margin-right: 14px;
                min-width: 165px;
            }

            li a {
                text-decoration: none;
                color: #444444;
                padding: 18px 24px;
                display: block;
                text-align: center;
                font-size: 16px;
            }

            li a:hover {
                background-color: #a9a9a9;
                color: #ffffff;
            }

            .active-link {
                background-color: #a9a9a9;
                color: #ffffff;
            }

            h1 {
                text-align: center;
                margin-top: 130px;
                font-size: 34px;
                font-weight: normal;
            }

            .search-box {
                width: 540px;
                margin: 40px auto;
                border: 1px solid #d6d6d0;
                background-color: #ffffff;
                padding: 28px;
                box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
            }

            table {
                width: 100%;
            }

            td {
                padding: 10px;
            }

            input[type="text"] {
                width: 95%;
                padding: 10px;
                border: 1px solid #c8c8c2;
                background-color: #fafaf8;
            }

            .button-row {
                text-align: center;
            }

            input[type="submit"],
            input[type="reset"] {
                padding: 10px 18px;
                margin: 0 6px;
                border: 1px solid #2f3b45;
                background-color: #2f3b45;
                color: white;
            }

            .result-box {
                width: 540px;
                margin: 20px auto;
                border: 1px solid #d6d6d0;
                background-color: #ffffff;
                padding: 28px;
                box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
            }

            .car-item {
                border-bottom: 1px solid #e2e2dc;
                padding: 14px 0;
            }

            .car-item:last-child {
                border-bottom: none;
            }

            .detail-link {
                text-decoration: none;
                color: #2f3b45;
                font-weight: bold;
            }

            .note {
                text-align: center;
                font-size: 12pt;
                color: #666666;
            }

            @media screen and (max-width: 768px) {
                p.logo {
                    margin: 20px 0 10px 20px;
                }

                ul {
                    margin: 0 20px 20px 20px;
                }

                li {
                    float: none;
                    min-width: auto;
                    margin-right: 0;
                    margin-bottom: 10px;
                }

                h1 {
                    margin-top: 40px;
                    font-size: 28px;
                }

                .search-box,
                .result-box {
                    width: 88%;
                    padding: 20px;
                }

                td {
                    display: block;
                    width: 100%;
                    padding: 6px 0;
                }

                input[type="text"] {
                    width: 100%;
                }
            }
        </style>
    </head>

    <body>
        <p class="logo"><a href="search.html">LOGO</a></p>

        <ul>
            <li><a href="homepage.html">HOME</a></li>
            <li><a href="registration.html">REGISTER</a></li>
            <li><a href="login.html">LOGIN</a></li>
            <li><a class="active-link" href="search.html">SEARCH</a></li>
        </ul>

        <h1>Search Cars</h1>

        <div class="search-box">
            <form onsubmit="return showResult()" onreset="clearResult()">
                <table>
                    <tr>
                        <td>Car Model</td>
                        <td><input type="text" id="model" placeholder="Enter car model"></td>
                    </tr>

                    <tr>
                        <td>Car Year</td>
                        <td><input type="text" id="year" placeholder="Enter car year"></td>
                    </tr>

                    <tr>
                        <td colspan="2" class="button-row">
                            <input type="submit" value="Search">
                            <input type="reset" value="Reset">
                        </td>
                    </tr>
                </table>
            </form>
        </div>

        <div class="result-box">
            <h3>Search Result</h3>
            <div id="result">No result yet.</div>
        </div>

        <p class="note">This is the first draft of search page.</p>

        <script>
            var carList = [
                {
                    brand: "Toyota",
                    model: "Toyota Camry",
                    year: "2020",
                    price: "120000 RMB",
                    color: "Black",
                    mileage: "50000 km",
                    transmission: "Automatic",
                    fuel: "Petrol",
                    condition: "Used",
                    seller: "QMUL Car Dealer",
                    contact: "07123 456789",
                    description: "A clean used car for family daily use."
                },
                {
                    brand: "Honda",
                    model: "Honda Civic",
                    year: "2019",
                    price: "95000 RMB",
                    color: "White",
                    mileage: "62000 km",
                    transmission: "Automatic",
                    fuel: "Petrol",
                    condition: "Used",
                    seller: "QMUL Car Dealer",
                    contact: "07123 456789",
                    description: "A popular small car with good condition."
                },
                {
                    brand: "BMW",
                    model: "BMW X3",
                    year: "2021",
                    price: "280000 RMB",
                    color: "Grey",
                    mileage: "30000 km",
                    transmission: "Automatic",
                    fuel: "Petrol",
                    condition: "Used",
                    seller: "QMUL Car Dealer",
                    contact: "07123 456789",
                    description: "A clean SUV with low mileage."
                },
                {
                    brand: "Audi",
                    model: "Audi A4",
                    year: "2020",
                    price: "210000 RMB",
                    color: "Blue",
                    mileage: "41000 km",
                    transmission: "Automatic",
                    fuel: "Petrol",
                    condition: "Used",
                    seller: "QMUL Car Dealer",
                    contact: "07123 456789",
                    description: "A comfortable sedan for city and family use."
                },
                {
                    brand: "Toyota",
                    model: "Toyota Corolla",
                    year: "2018",
                    price: "88000 RMB",
                    color: "Silver",
                    mileage: "73000 km",
                    transmission: "Automatic",
                    fuel: "Petrol",
                    condition: "Used",
                    seller: "QMUL Car Dealer",
                    contact: "07123 456789",
                    description: "An economic car with stable performance."
                }
            ];

            function makeDetailLink(car) {
                var link = "car-detail.html?";
                link += "brand=" + encodeURIComponent(car.brand);
                link += "&model=" + encodeURIComponent(car.model);
                link += "&year=" + encodeURIComponent(car.year);
                link += "&price=" + encodeURIComponent(car.price);
                link += "&color=" + encodeURIComponent(car.color);
                link += "&mileage=" + encodeURIComponent(car.mileage);
                link += "&transmission=" + encodeURIComponent(car.transmission);
                link += "&fuel=" + encodeURIComponent(car.fuel);
                link += "&condition=" + encodeURIComponent(car.condition);
                link += "&seller=" + encodeURIComponent(car.seller);
                link += "&contact=" + encodeURIComponent(car.contact);
                link += "&description=" + encodeURIComponent(car.description);
                return link;
            }

            function makeCarResult(car) {
                var text = "";
                text += "<div class='car-item'>";
                text += "<p><b>Model:</b> " + car.model + "</p>";
                text += "<p><b>Year:</b> " + car.year + "</p>";
                text += "<p><b>Price:</b> " + car.price + "</p>";
                text += "<p><b>Color:</b> " + car.color + "</p>";
                text += "<p><b>Mileage:</b> " + car.mileage + "</p>";
                text += "<p><a class='detail-link' href='" + makeDetailLink(car) + "'>View Detail</a></p>";
                text += "</div>";
                return text;
            }

            function showResult() {
                var modelValue = document.getElementById("model").value.toLowerCase();
                var yearValue = document.getElementById("year").value;
                var resultText = document.getElementById("result");
                var output = "";
                var i = 0;
                var modelMatch = false;
                var yearMatch = false;

                if (modelValue == "" && yearValue == "") {
                    resultText.innerHTML = "Please enter car model or car year.";
                    return false;
                }

                for (i = 0; i < carList.length; i++) {
                    modelMatch = false;
                    yearMatch = false;

                    if (modelValue == "") {
                        modelMatch = true;
                    }
                    else if (carList[i].model.toLowerCase().indexOf(modelValue) != -1 || carList[i].brand.toLowerCase().indexOf(modelValue) != -1) {
                        modelMatch = true;
                    }

                    if (yearValue == "") {
                        yearMatch = true;
                    }
                    else if (carList[i].year == yearValue) {
                        yearMatch = true;
                    }

                    if (modelMatch == true && yearMatch == true) {
                        output += makeCarResult(carList[i]);
                    }
                }

                if (output == "") {
                    output = "No car found.";
                }

                resultText.innerHTML = output;
                return false;
            }

            function clearResult() {
                document.getElementById("result").innerHTML = "No result yet.";
            }
        </script>
    </body>
</html>
