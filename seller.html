<!DOCTYPE html>
<html lang="en">
<head>
    <title>Seller</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style type="text/css">
        body {
            font-family: Times New Roman;
            background-color:  #f4f4f1;
            color: #222222;
            margin: 10%;
        }

        .title {
            text-align: center;
            color: #222222;
        }

        .nav {
            background-color: #ffffff;
            padding: 10px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid #d6d6d0;
        }

        .nav a {
            display: inline-block;
            margin-right: 10px;
            margin-bottom: 5px;
            padding: 10px 16px;
            color: #444444;
            text-decoration: none;
            background-color: #ffffff;
            border: 1px solid #cfcfc8;
        }

        .nav a:hover {
            background-color: #a9a9a9;
            color: #ffffff;
        }

        .active-link {
            background-color: #a9a9a9;
            color: #ffffff;
        }

        .form-box {
            background-color: #ffffff;
            width: 360px;
            padding: 20px;
            margin: auto;
            border: 1px solid #d6d6d0;
        }

        .form-box p {
            color: #222222;
            margin-top: 0;
            margin-bottom: 14px;
        }

        .form-box a {
            display: inline-block;
            margin-bottom: 8px;
            padding: 10px 14px;
            color: #444444;
            text-decoration: none;
            font-weight: bold;
            background-color: #ffffff;
            border: 1px solid #cfcfc8;
        }

        .form-box a:hover {
            background-color: #a9a9a9;
            color: #444444;
        }

        @media only screen and (max-width: 768px) {
            body {
                margin: 5%;
            }

            .nav a {
                display: block;
                margin: 5px 0;
            }

            .form-box {
                width: 100%;
            }
        }
    </style>
</head>

<body>


    <h1 class="title">Online Car Sale</h1>
    <p class="title">Seller Page</p>

    <div class="nav">
        <a href="homepage.html">Home</a>
        <a href="seller.html" class="active-link">Seller</a>
        <a href="registration.html">Register</a>
        <a href="login.html">Login</a>
        <a href="add-car.html">Add Car</a>
        <a href="search.html">Search</a>
    </div>

    <div class="form-box">
        <p><b>Seller Services</b></p>

        <p><a href="registration.html">Seller Registration</a></p>
        <p>Create a new seller account.</p>

        <p><a href="login.html">Seller Login</a></p>
        <p>Login to your seller account.</p>

        <p><a href="add-car.html">Add Car</a></p>
        <p>Add your car details for sale.</p>
    </div>

</body>
</html>
