<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Online Car Sale - Homepage</title>
        <style>
            body {
                background-color: #d9d9d9;
                font-family: Arial, sans-serif;
                color: #222222;
            }
            p.logo {
                position: relative;
                left: 1%;
                top: 1%;
            }
            ul {
                list-style-type: none;
            }
            li {
                float: left;
                border: 1px solid #666666;
                padding: 2% 3%;
                background-color: #bfbfbf;
            }
            li a {
                text-decoration: none;
                color: #222222;
                padding: 1.5em 2em;
            }
            li a:hover {
                background-color: #8c8c8c;
                color: white;
            }
            .search-box {
                text-align: center;
                background-color: #efefef;
                padding: 15px;
            }
            .search-box input {
                padding: 6px;
                margin: 4px;
                border: 1px solid #888888;
            }
            .intro-box {
                margin-top: 30px;
                padding: 10px;
                background-color: #efefef;
            }
            .link-box {
                margin-top: 20px;
                padding: 10px;
                background-color: #efefef;
            }
            .footer {
                margin-top: 30px;
                text-align: center;
                font-size: 12pt;
                color: #444444;
            }
        </style>
    </head>

    <body>
        <p class="logo"><a href="homepage.html">LOGO</a></p>
        <ul>
            <li><a href="homepage.html">HOME</a></li>
            <li><a href="sell.html">SELL</a></li>
            <li><a href="buy.html">BUY</a></li>
            <li><a href="aboutus.html">ABOUT US</a></li>
        </ul>

        <br><br><br><br><br><br>

        <div class="search-box">
            <input type="text" placeholder="Car Model">
            <input type="text" placeholder="Car Year"><br><br>
            <input type="submit" value="SEARCH">
            <input type="reset" value="RESET">
        </div>

        <div class="intro-box">
            <p style="font-size: 14pt;">Welcome to our Car Dealership!</p>
            <p>We provide a simple platform for users to search and explore cars online.</p>
        </div>

        <div class="link-box">
            <p><a href="sell.html">Seller page will be added later.</a></p>
            <p><a href="buy.html">Buyer page will be added later.</a></p>
        </div>

        <div class="footer">
            <p>Online Car Sale Website</p>
        </div>
    </body>
</html>
