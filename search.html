<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Search Page</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <style>
            body {
                background-color: #f4f4f1;
                font-family: Arial, sans-serif;
                color: #222222;
                margin: 0;
            }

            p.logo {
                margin: 30px 0 10px 60px;
                font-size: 18px;
                font-weight: bold;
                letter-spacing: 2px;
            }

            p.logo a {
                text-decoration: none;
                color: #222222;
            }

            ul {
                list-style-type: none;
                margin: 0 0 20px 40px;
                padding: 0;
            }

            li {
                float: left;
                border: 1px solid #cfcfc8;
                padding: 12px 18px;
                background-color: #ffffff;
                margin-right: 10px;
            }

            li a {
                text-decoration: none;
                color: #444444;
                padding: 10px 16px;
            }

            li a:hover {
                color: #111111;
            }

            h1 {
                text-align: center;
                margin-top: 130px;
                font-size: 34px;
                font-weight: normal;
            }

            .search-box {
                width: 540px;
                margin: 40px auto;
                border: 1px solid #d6d6d0;
                background-color: #ffffff;
                padding: 28px;
                box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
            }

            table {
                width: 100%;
            }

            td {
                padding: 10px;
            }

            input[type="text"] {
                width: 95%;
                padding: 10px;
                border: 1px solid #c8c8c2;
                background-color: #fafaf8;
            }

            .button-row {
                text-align: center;
            }

            input[type="submit"],
            input[type="reset"] {
                padding: 10px 18px;
                margin: 0 6px;
                border: 1px solid #2f3b45;
                background-color: #2f3b45;
                color: white;
            }

            .result-box {
                width: 540px;
                margin: 20px auto;
                border: 1px solid #d6d6d0;
                background-color: #ffffff;
                padding: 28px;
                box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
            }

            .note {
                text-align: center;
                font-size: 12pt;
                color: #666666;
            }
        </style>
    </head>

    <body>
        <p class="logo"><a href="search.html">LOGO</a></p>

        <ul>
            <li><a href="home.html">HOME</a></li>
            <li><a href="registration.html">REGISTER</a></li>
            <li><a href="login.html">LOGIN</a></li>
            <li><a href="search.html">SEARCH</a></li>
        </ul>

        <h1>Search Cars</h1>

        <div class="search-box">
            <form onsubmit="return showResult()" onreset="clearResult()">
                <table>
                    <tr>
                        <td>Car Model</td>
                        <td><input type="text" id="model" placeholder="Enter car model"></td>
                    </tr>

                    <tr>
                        <td>Car Year</td>
                        <td><input type="text" id="year" placeholder="Enter car year"></td>
                    </tr>

                    <tr>
                        <td colspan="2" class="button-row">
                            <input type="submit" value="Search">
                            <input type="reset" value="Reset">
                        </td>
                    </tr>
                </table>
            </form>
        </div>

        <div class="result-box">
            <h3>Search Result</h3>
            <p id="result">No result yet.</p>
        </div>

        <p class="note">This is the first draft of search page.</p>

        <script>
            function showResult() {
                var modelValue = document.getElementById("model").value;
                var yearValue = document.getElementById("year").value;
                var resultText = document.getElementById("result");

                if (modelValue == "" && yearValue == "") {
                    resultText.innerHTML = "Please enter car model or car year.";
                    return false;
                }

                resultText.innerHTML = "Toyota Camry, 2020, 120000 RMB";
                return false;
            }

            function clearResult() {
                document.getElementById("result").innerHTML = "No result yet.";
            }
        </script>
    </body>
</html>
