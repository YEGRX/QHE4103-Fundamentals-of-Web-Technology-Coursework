<!DOCTYPE html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Car - Online Car Sale</title>
    <style type="text/css">
        body {
            background-color: #f4f4f1;
            font-family: Times New Roman;
            color: #222222;
            margin: 0;
        }

        p.logo {
            margin: 30px 0 10px 60px;
            font-size: 20px;
            font-weight: bold;
        }

        p.logo a {
            text-decoration: none;
            color: #222222;
        }

        ul {
            list-style-type: none;
            margin: 0 0 20px 0;
            padding: 0;
            text-align: center;
        }

        li {
            display: inline-block;
            border: 1px solid #cfcfc8;
            background-color: #ffffff;
            margin-right: 5px;
            margin-bottom: 5px;
        }

        li a {
            display: block;
            text-decoration: none;
            color: #444444;
            padding: 12px 25px;
        }

        li a:hover {
            background-color: #a9a9a9;
            color: #ffffff;
        }

        .current-page {
            background-color: #a9a9a9;
        }

        .current-page a {
            color: #ffffff;
        }

        .main-box {
            margin: 40px auto;
            max-width: 900px;
            text-align: center;
        }

        .main-box h1 {
            color: #222222;
            font-size: 34px;
            font-weight: normal;
            margin-bottom: 20px;
        }

        .main-box p {
            margin-bottom: 25px;
        }

        .form-box {
            background-color: #ffffff;
            border: 1px solid #d6d6d0;
            padding: 28px;
            width: 460px;
            max-width: 100%;
            margin: 0 auto;
            text-align: left;
        }

        .text1 {
            width: 220px;
            border: 1px solid #c8c8c2;
            background-color: #fafaf8;
            padding: 4px;
        }

        .btn1 {
            width: 90px;
            background-color: #2f3b45;
            color: white;
            border: 1px solid #2f3b45;
            padding: 5px 8px;
        }

        @media only screen and (max-width: 768px) {
            p.logo {
                margin: 20px 0 10px 20px;
            }

            li {
                display: block;
                width: 88%;
                margin: 0 auto 10px auto;
            }

            .main-box {
                margin: 30px auto;
                width: 88%;
            }

            .main-box h1 {
                font-size: 28px;
            }

            .form-box {
                width: 100%;
                padding: 20px;
            }

            .text1 {
                width: 100%;
            }
        }
    </style>

    <script type="text/javascript">
        function setYellow(x)
        {
            document.getElementById(x).style.background = "#efeee8";
        }

        function setWhite(x)
        {
            document.getElementById(x).style.background = "#fafaf8";
        }

        function checkCar()
        {
            x = document.getElementById("colour").value;
            y = document.getElementById("model").value;
            z = document.getElementById("year").value;
            a = document.getElementById("location").value;
            b = document.getElementById("price").value;
            c = document.getElementById("carimage").value;

            p1 = /^[0-9]{4}$/;
            p2 = /^[0-9]+$/;

            if (x == "" || y == "" || z == "" || a == "" || b == "" || c == "")
            {
                alert("Please fill in all car details");
                return false;
            }
            else if (p1.test(z) == false)
            {
                alert("Year should be 4 digits");
                return false;
            }
            else if (p2.test(b) == false)
            {
                alert("Price should be numeric only");
                return false;
            }
            else
            {
                alert("Car details look good");
                return true;
            }
        }
    </script>
</head>

<body>



    <p class="logo"><a href="homepage.html">CAR SALE</a></p>

    <ul>
        <li><a href="homepage.html">HOME</a ></li>
        <li><a href="seller.html">SELLER</a></li>
        <li><a href="registration.html">REGISTER</a ></li>
        <li><a href="login.html">LOGIN</a ></li>
        <li class="current-page"><a href="add-car.html">ADD CAR</a ></li>
        <li><a href="search.html">SEARCH</a ></li>
    </ul>

    <div class="main-box">
        <h1>Add Your Car For Sale</h1>
        <p>Please enter your car details below.</p>

        <div class="form-box">
            <form onsubmit="return checkCar()">
                Colour<br>
                <input class="text1" type="text" name="colour" id="colour" onfocus="setYellow('colour')" onblur="setWhite('colour')"><br><br>

                Model<br>
                <input class="text1" type="text" name="model" id="model" onfocus="setYellow('model')" onblur="setWhite('model')"><br><br>

                Year<br>
                <input class="text1" type="text" name="year" id="year" onfocus="setYellow('year')" onblur="setWhite('year')"><br><br>

                Location<br>
                <input class="text1" type="text" name="location" id="location" onfocus="setYellow('location')" onblur="setWhite('location')"><br><br>

                Price<br>
                <input class="text1" type="text" name="price" id="price" onfocus="setYellow('price')" onblur="setWhite('price')"><br><br>

                Image of Car<br>
                <input type="file" name="carimage" id="carimage"><br><br>

                <input class="btn1" type="button" value="Check" onclick="checkCar()">
                <input class="btn1" type="submit" value="Submit">
                <input class="btn1" type="reset" value="Clear">
            </form>
        </div>
    </div>

</body>
</html>
