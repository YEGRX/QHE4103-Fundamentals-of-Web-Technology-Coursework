<!DOCTYPE html>
<html lang="en">
<head>
    <title>Registration</title>

    <style>
        body {
            font-family: Times New Roman;
            background-color: lightgray;
            margin: 20px;
        }

        .title {
            text-align: center;
        }

        .nav {
            background-color: white;
            padding: 10px;
            margin-bottom: 20px;
        }

        .nav a {
            margin-right: 10px;
            color: blue;
        }

        .form-box {
            background-color: white;
            width: 320px;
            padding: 15px;
        }

        .form-box input {
            width: 200px;
        }
    </style>

    <script type="text/javascript">
        function check1()
        {
            x = document.getElementById("name").value;
            y = document.getElementById("username").value;

            if (x == "" || y == "")
            {
                alert("Please enter name and username");
            }
            else
            {
                alert("Form looks good");
            }
        }
    </script>
</head>

<body>
    <!-- Today I added a small JavaScript check. -->

    <h1 class="title">Online Car Sale</h1>
    <p class="title">Seller Registration Page</p>

    <div class="nav">
        <a href="index.html">Home</a>
        <a href="registration.html">Register</a>
        <a href="login.html">Login</a>
        <a href="add-car.html">Add Car</a>
        <a href="search.html">Search</a>
    </div>

    <div class="form-box">
        <form>
            Name<br>
            <input type="text" name="name" id="name"><br><br>

            Address<br>
            <input type="text" name="address"><br><br>

            Phone Number<br>
            <input type="text" name="phone"><br><br>

            Email Address<br>
            <input type="text" name="email"><br><br>

            Username<br>
            <input type="text" name="username" id="username"><br><br>

            Password<br>
            <input type="password" name="password"><br><br>

            <input type="button" value="Check Form" onclick="check1()">
            <input type="submit" value="Submit">
            <input type="reset" value="Clear">
        </form>
    </div>
</body>
</html>
