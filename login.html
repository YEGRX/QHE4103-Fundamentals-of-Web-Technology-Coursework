<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Login Page</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <style>
            body {
                background-color: #f4f4f1;
                font-family: Arial, sans-serif;
                color: #222222;
                margin: 0;
            }

            p.logo {
                margin: 30px 0 10px 60px;
                font-size: 18px;
                font-weight: bold;
                letter-spacing: 2px;
            }

            p.logo a {
                text-decoration: none;
                color: #222222;
            }

            ul {
                list-style-type: none;
                margin: 0 0 20px 40px;
                padding: 0;
                overflow: hidden;
            }

            li {
                float: left;
                border: 1px solid #cfcfc8;
                background-color: #ffffff;
                margin-right: 14px;
                min-width: 165px;
            }

            li a {
                text-decoration: none;
                color: #444444;
                padding: 18px 24px;
                display: block;
                text-align: center;
                font-size: 16px;
            }

            li a:hover {
                background-color: #a9a9a9;
                color: #ffffff;
            }

            .active-link {
                background-color: #a9a9a9;
                color: #ffffff;
            }

            h1 {
                text-align: center;
                margin-top: 130px;
                font-size: 34px;
                font-weight: normal;
            }

            .login-box {
                width: 460px;
                margin: 40px auto;
                border: 1px solid #d6d6d0;
                background-color: #ffffff;
                padding: 28px;
                box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
            }

            table {
                width: 100%;
            }

            td {
                padding: 10px;
            }

            input[type="text"],
            input[type="password"] {
                width: 95%;
                padding: 10px;
                border: 1px solid #c8c8c2;
                background-color: #fafaf8;
            }

            .button-row {
                text-align: center;
            }

            input[type="submit"],
            input[type="reset"] {
                padding: 10px 18px;
                margin: 0 6px;
                border: 1px solid #2f3b45;
                background-color: #2f3b45;
                color: white;
            }

            .note {
                text-align: center;
                font-size: 12pt;
                color: #666666;
            }

            #message {
                text-align: center;
                color: red;
                font-size: 14px;
                margin-top: 18px;
            }

            @media screen and (max-width: 768px) {
                p.logo {
                    margin: 20px 0 10px 20px;
                }

                ul {
                    margin: 0 20px 20px 20px;
                }

                li {
                    float: none;
                    min-width: auto;
                    margin-right: 0;
                    margin-bottom: 10px;
                }

                h1 {
                    margin-top: 40px;
                    font-size: 28px;
                }

                .login-box {
                    width: 88%;
                    padding: 20px;
                }

                td {
                    display: block;
                    width: 100%;
                    padding: 6px 0;
                }

                input[type="text"],
                input[type="password"] {
                    width: 100%;
                }
            }
        </style>
    </head>

    <body>
        <p class="logo"><a href="login.html">LOGO</a></p>

        <ul>
            <li><a href="homepage.html">HOME</a></li>
            <li><a href="registration.html">REGISTER</a></li>
            <li><a class="active-link" href="login.html">LOGIN</a></li>
            <li><a href="seller.html">SELLER</a></li>
            <li><a href="add-car.html">ADD CAR</a></li>
            <li><a href="search.html">SEARCH</a></li>
        </ul>

        <h1>Seller Login</h1>

        <div class="login-box">
            <form onsubmit="return checkForm()">
                <table>
                    <tr>
                        <td>Username</td>
                        <td><input type="text" id="username" placeholder="Enter your username" onfocus="setYellow('username')" onblur="setWhite('username')"></td>
                    </tr>

                    <tr>
                        <td>Password</td>
                        <td><input type="password" id="password" placeholder="Enter your password" onfocus="setYellow('password')" onblur="setWhite('password')"></td>
                    </tr>

                    <tr>
                        <td colspan="2" class="button-row">
                            <input type="submit" value="Login">
                            <input type="reset" value="Reset">
                        </td>
                    </tr>
                </table>
            </form>

            <p id="message"></p>
        </div>

        <script>
            function setYellow(x) {
                document.getElementById(x).style.background = "yellow";
            }

            function setWhite(x) {
                document.getElementById(x).style.background = "white";
            }

            function checkForm() {
                var usernameValue = document.getElementById("username").value;
                var passwordValue = document.getElementById("password").value;
                var messageText = document.getElementById("message");

                if (usernameValue == "" || passwordValue == "") {
                    messageText.innerHTML = "Username and password cannot be empty.";
                    return false;
                }

                if (usernameValue.length < 6 || usernameValue.length > 12) {
                    messageText.innerHTML = "Username must be between 6 and 12 characters.";
                    return false;
                }

                if (passwordValue.length < 6) {
                    messageText.innerHTML = "Password must be at least 6 characters.";
                    return false;
                }

                messageText.style.color = "green";
                messageText.innerHTML = "Login success.";
                window.location.href = "seller.html";
                return false;
            }
        </script>
    </body>
</html>
