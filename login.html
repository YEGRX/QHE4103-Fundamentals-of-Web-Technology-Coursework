<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Login Page</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <style>
            body {
                background-color: lightyellow;
                font-family: Arial;
            }

            p.logo {
                position: relative;
                left: 1%;
                top: 1%;
                font-size: 20px;
                font-weight: bold;
            }

            p.logo a {
                text-decoration: none;
                color: black;
            }

            ul {
                list-style-type: none;
            }

            li {
                float: left;
                border: 1px solid black;
                padding: 2% 3%;
                background-color: gray;
                margin-right: 8px;
            }

            li a {
                text-decoration: none;
                color: white;
                padding: 1.5em 2em;
            }

            li a:hover {
                background-color: green;
                color: white;
            }

            h1 {
                text-align: center;
                margin-top: 120px;
            }

            .login-box {
                width: 420px;
                margin: 40px auto;
                border: 1px solid black;
                background-color: white;
                padding: 20px;
            }

            table {
                width: 100%;
            }

            td {
                padding: 10px;
            }

            input[type="text"],
            input[type="password"] {
                width: 95%;
                padding: 8px;
            }

            .button-row {
                text-align: center;
            }

            .note {
                text-align: center;
                font-size: 14pt;
            }

            #message {
                text-align: center;
                color: red;
                font-size: 14px;
            }
        </style>
    </head>

    <body>
        <p class="logo"><a href="login.html">LOGO</a></p>

        <ul>
            <li><a href="home.html">HOME</a></li>
            <li><a href="registration.html">REGISTER</a></li>
            <li><a href="login.html">LOGIN</a></li>
            <li><a href="search.html">SEARCH</a></li>
        </ul>

        <h1>Seller Login</h1>

        <div class="login-box">
            <!-- first draft of seller login page -->
            <form onsubmit="return checkLogin()">
                <table>
                    <tr>
                        <td>Email</td>
                        <td><input type="text" id="email" placeholder="Enter your email"></td>
                    </tr>

                    <tr>
                        <td>Password</td>
                        <td><input type="password" id="password" placeholder="Enter your password"></td>
                    </tr>

                    <tr>
                        <td colspan="2" class="button-row">
                            <input type="submit" value="Login">
                            <input type="reset" value="Reset">
                        </td>
                    </tr>
                </table>
            </form>

            <p id="message"></p>
        </div>

        <p class="note">This is the first draft of login page.</p>

        <script>
            function checkLogin() {
                var emailValue = document.getElementById("email").value;
                var passwordValue = document.getElementById("password").value;
                var messageText = document.getElementById("message");

                if (emailValue == "" || passwordValue == "") {
                    messageText.innerHTML = "Email and password cannot be empty.";
                    return false;
                }

                messageText.style.color = "green";
                messageText.innerHTML = "Login form submitted successfully.";
                return false;
            }
        </script>
    </body>
</html>
