<!DOCTYPE html>
<html lang="en">
<head>
    <title>Registration</title>

    <style type="text/css">
        body {
            font-family: Times New Roman;
            background-color: lightgray;
            margin: 20%;
        }

        .title {
            text-align: center;
        }

        .nav {
            background-color: white;
            padding: 10px;
            margin-bottom: 20px;
        }

        .nav a {
            margin-right: 10px;
            color: blue;
        }

        .form-box {
            background-color: white;
            width: 320px;
            padding: 15px;
        }
    </style>

    <script type="text/javascript">
        function check1()
        {
            x = document.getElementById("name").value;
            y = document.getElementById("username").value;
            z = document.getElementById("address").value;
            a = document.getElementById("phone").value;
            b = document.getElementById("email").value;
            c = document.getElementById("password").value;

            p0 = /^[A-Za-z ]+$/;
            p1 = /^[A-Za-z0-9 ]+$/;
            p2 = /^1[0-9]{10}$/;
            p3 = /^[^@]+@[^@]+\.(cn|com)$/;
            p4 = /^[A-Za-z0-9]{6,}$/;

            if (x == "" || y == "" || z == "" || a == "" || b == "" || c == "")
            {
                alert("Please fill in all required details");
            }
            else if (p0.test(x) == false)
            {
                alert("Name should contain letters and space only");
            }
            else if (p1.test(z) == false)
            {
                alert("Address should contain letters, numbers and space only");
            }
            else if (p2.test(a) == false)
            {
                alert("Please enter a valid China phone number");
            }
            else if (p3.test(b) == false)
            {
                alert("Please enter a valid email address ending with .cn or .com");
            }
            else if (p4.test(y) == false)
            {
                alert("Username must be at least 6 alphanumeric characters");
            }
            else if (p4.test(c) == false)
            {
                alert("Password must be at least 6 alphanumeric characters");
            }
            else
            {
                alert("Form looks good");
            }
        }
    </script>
</head>

<body>

    <!-- Today I added a small JavaScript check. -->

    <h1 class="title">Online Car Sale</h1>
    <p class="title">Seller Registration Page</p>

    <div class="nav">
        <a href="index.html">Home</a>
        <a href="registration.html">Register</a>
        <a href="login.html">Login</a>
        <a href="add-car.html">Add Car</a>
        <a href="search.html">Search</a>
    </div>

    <div class="form-box">
        <form>
            Name<br>
            <input type="text" name="name" id="name"><br><br>

            Address<br>
            <input type="text" name="address" id="address"><br><br>

            Phone Number<br>
            <input type="text" name="phone" id="phone"><br><br>

            Email Address<br>
            <input type="text" name="email" id="email"><br><br>

            Username<br>
            <input type="text" name="username" id="username"><br><br>

            Password<br>
            <input type="password" name="password" id="password"><br><br>

            <input type="button" value="Check Form" onclick="check1()">
            <input type="submit" value="Submit">
            <input type="reset" value="Clear">
        </form>
    </div>

</body>
</html>
